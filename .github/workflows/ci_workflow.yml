name: CI / Automated testing
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Elixir ${{ matrix.elixir }} OTP ${{ matrix.otp }}
    env:
      MIX_ENV: test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: supersecret
        ports:
          - 5432:5432
      mysql:
        image: mysql:debian
        env:
          MYSQL_ROOT_PASSWORD: supersecret
        ports:
          - 3306:3306

    strategy:
      # https://hexdocs.pm/elixir/1.18/compatibility-and-deprecations.html#compatibility-between-elixir-and-erlang-otp
      matrix:
        include:
          # soft support floor
          - elixir: 1.16.x
            otp: 26.x
          # support floor
          - elixir: 1.18.x
            otp: 27.x
          # support ceiling
          - elixir: 1.20.x
            otp: 29.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - name: Cache deps
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: cache-v4-${{steps.setup-beam.outputs.elixir-version}}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            cache-v4-${{steps.setup-beam.outputs.elixir-version}}-
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mix deps.get
      - name: Check code formatting
        if: matrix.elixir == '1.20.x'
        run: mix format --check-formatted
      - name: Compile dependencies
        run: mix deps.compile
      - name: Compile code (warnings as errors)
        run: mix compile --warnings-as-errors
      - name: Run tests
        run: mix test
      - name: Create docs
        if: matrix.elixir == '1.20.x'
        run: mix docs
